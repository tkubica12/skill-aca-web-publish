name: Publish ACA web proxy image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - blob_proxy_app.py
      - requirements.txt
      - .github/workflows/publish-web-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/aca-web-proxy:latest

